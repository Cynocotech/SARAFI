# ── Local development / Dokploy reference stack ─────────────────────────────
# Copy .env.example to .env and fill in the required values before running.
# For Dokploy: deploy only the app service; use Dokploy's managed MySQL add-on
# and set all environment variables in the Dokploy UI.

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "${APP_NAME:-AghaySarafi}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      APP_KEY: "${APP_KEY}"

      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-laravel}"
      DB_USERNAME: "${DB_USERNAME:-laravel}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"

      SESSION_DRIVER: database
      SESSION_DOMAIN: "${SESSION_DOMAIN:-}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"

      CACHE_STORE: database
      QUEUE_CONNECTION: database

      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-hello@example.com}"
      MAIL_FROM_NAME: "${APP_NAME:-AghaySarafi}"

      STRIPE_KEY: "${STRIPE_KEY:-}"
      STRIPE_SECRET: "${STRIPE_SECRET:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"

      # Set to false on additional replicas — only one container should run migrations
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage/app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
      MYSQL_USER: "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-33060}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s

volumes:
  mysql_data:
  app_storage:
