# ── Local development / Dokploy reference stack ─────────────────────────────
# Copy .env.example to .env and fill in APP_KEY before running.
# No external database needed — SQLite file lives inside the named volume.

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "${APP_NAME:-Aghay Sarafi}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      APP_KEY: "${APP_KEY}"

      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite

      SESSION_DRIVER: database
      SESSION_DOMAIN: "${SESSION_DOMAIN:-}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"

      CACHE_STORE: database
      QUEUE_CONNECTION: database

      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-hello@example.com}"
      MAIL_FROM_NAME: "${APP_NAME:-Aghay Sarafi}"

      STRIPE_KEY: "${STRIPE_KEY:-}"
      STRIPE_SECRET: "${STRIPE_SECRET:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"

      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
    volumes:
      # Persist the SQLite database and uploaded files across container restarts/redeploys
      - app_data:/var/www/html/database
      - app_storage:/var/www/html/storage/app

volumes:
  app_data:
  app_storage:
