services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080}"
      DATABASE_PATH: /app/data/exchange.sqlite
    volumes:
      - api_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${API_URL:-http://localhost:4000}"
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  api_data:
